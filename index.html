          <circle class="progress-ring-fg" cx="45" cy="45" r="38"
            stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
        </svg>
        <div class="progress-ring-text">${stats.accuracy}%</div>
      </div>
      <div class="progress-info">
        <h3>Overall Accuracy</h3>
        <p>Keep reviewing to master all drug names</p>
        <div class="progress-stats">
          <div class="progress-stat"><strong>${stats.mastered}</strong>Mastered</div>
          <div class="progress-stat"><strong>${stats.learning}</strong>Learning</div>
          <div class="progress-stat"><strong>${stats.newCards}</strong>New</div>
        </div>
      </div>
    </div>

    <div class="mode-selector">
      <button class="mode-btn ${state.mode === 'brand-to-generic' ? 'active' : ''}" data-action="set-mode" data-mode="brand-to-generic">
        <span class="mode-label">Brand → Generic</span>
        <span class="mode-desc">See brand, recall generic</span>
      </button>
      <button class="mode-btn ${state.mode === 'generic-to-brand' ? 'active' : ''}" data-action="set-mode" data-mode="generic-to-brand">
        <span class="mode-label">Generic → Brand</span>
        <span class="mode-desc">See generic, recall brand</span>
      </button>
    </div>

    <div class="action-buttons">
      <button class="action-btn btn-primary" data-action="start-study">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="16" height="16" rx="2"/><path d="M6 2v4M18 2v4M2 10h16"/></svg>
        Study
      </button>
      <button class="action-btn btn-secondary" data-action="start-quiz">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Quiz
      </button>
    </div>

    <div class="section-title">Categories <button class="see-all" data-action="nav" data-view="browse">Browse All</button></div>
    <div class="category-chips">
      <button class="chip ${state.category === 'all' ? 'active' : ''}" data-action="set-cat" data-cat="all">All</button>
      ${CATEGORIES.map(c => `<button class="chip ${state.category === c ? 'active' : ''}" data-action="set-cat" data-cat="${c}">${c}</button>`).join('')}
    </div>

    <div class="quick-stats">
      <div class="stat-card mastered"><div class="stat-value">${stats.mastered}</div><div class="stat-label">Mastered</div></div>
      <div class="stat-card learning"><div class="stat-value">${stats.learning}</div><div class="stat-label">Learning</div></div>
      <div class="stat-card new-cards"><div class="stat-value">${stats.newCards}</div><div class="stat-label">Not Started</div></div>
    </div>
  </div>`;
        }

        /* ============================================================
           STUDY VIEW
           ============================================================ */
        function renderStudy() {
            if (state.studyCards.length === 0 || state.studyIndex >= state.studyCards.length) {
                return renderStudyComplete();
            }
            const idx = state.studyCards[state.studyIndex];
            const drug = DRUG_DATA[idx];
            const isBrandToGeneric = state.mode === 'brand-to-generic';
            const frontText = isBrandToGeneric ? drug.brand : drug.generic;
            const backText = isBrandToGeneric ? drug.generic : drug.brand;
            const frontLabel = isBrandToGeneric ? 'Brand Name' : 'Generic Name';
            const backLabel = isBrandToGeneric ? 'Generic Name' : 'Brand Name';
            const progress = ((state.studyIndex) / state.studyCards.length) * 100;

            return `<div class="study-view animate-in">
    <div class="study-top-bar">
      <button class="back-btn" data-action="nav" data-view="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Exit
      </button>
      <span class="study-counter">${state.studyIndex + 1} / ${state.studyCards.length}</span>
      ${state.streak >= 2 ? `<span class="study-streak"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>${state.streak} streak</span>` : ''}
    </div>
    <div class="study-progress-bar"><div class="study-progress-fill" style="width:${progress}%"></div></div>
    <div class="study-card-area">
      <div class="card-container ${state.isFlipped ? 'flipped' : ''}" id="flashcard" data-action="flip">
        <div class="card-face card-front">
          <span class="card-category-badge">${drug.cat}</span>
          <span class="card-label">${frontLabel}</span>
          <span class="card-text">${frontText}</span>
          <span class="card-hint">Tap to reveal</span>
        </div>
        <div class="card-face card-back">
          <span class="card-category-badge">${drug.cat}</span>
          <span class="card-label">${backLabel}</span>
          <span class="card-text">${backText}</span>
        </div>
      </div>
    </div>
    <p class="btn-flip-text">${state.isFlipped ? 'Did you know it?' : 'Tap the card to flip'}</p>
    <div class="study-actions">
      <button class="study-action-btn btn-dont-know" data-action="mark-incorrect" ${!state.isFlipped ? 'disabled style="opacity:0.4;cursor:default"' : ''}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Don't Know
      </button>
      <button class="study-action-btn btn-know" data-action="mark-correct" ${!state.isFlipped ? 'disabled style="opacity:0.4;cursor:default"' : ''}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Know It
      </button>
    </div>
  </div>`;
        }

        function renderStudyComplete() {
            const pct = state.studySessionTotal > 0 ? Math.round((state.studySessionCorrect / state.studySessionTotal) * 100) : 0;
            return `<div class="study-complete animate-in">
    <div class="complete-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h2>Session Complete</h2>
    <p>You've reviewed all ${state.studySessionTotal} cards in this session.</p>
    <div class="score-display">
      <div class="score-item"><div class="score-value" style="color:var(--success)">${state.studySessionCorrect}</div><div class="score-label">Correct</div></div>
      <div class="score-item"><div class="score-value" style="color:var(--error)">${state.studySessionTotal - state.studySessionCorrect}</div><div class="score-label">Incorrect</div></div>
      <div class="score-item"><div class="score-value" style="color:var(--primary)">${pct}%</div><div class="score-label">Accuracy</div></div>
    </div>
    <div class="complete-actions">
      <button class="action-btn btn-secondary" data-action="nav" data-view="home">Home</button>
      <button class="action-btn btn-primary" data-action="start-study">Study Again</button>
    </div>
  </div>`;
        }

        function startStudy() {
            const indices = getFilteredIndices();
            if (indices.length === 0) { showToast('No cards match your filters', 'warning'); return; }
            // Prioritize: incorrect cards first, then new, then correct
            const sorted = [...indices].sort((a, b) => {
                const ma = getMastery(a), mb = getMastery(b);
                const order = { learning: 0, new: 1, mastered: 2 };
                return (order[ma] || 1) - (order[mb] || 1);
            });
            state.studyCards = shuffleArray(sorted);
            state.studyIndex = 0;
            state.isFlipped = false;
            state.studySessionCorrect = 0;
            state.studySessionTotal = 0;
            state.streak = 0;
            navigate('study');
        }

        function flipCard() {
            if (state.view !== 'study' || state.studyIndex >= state.studyCards.length) return;
            state.isFlipped = !state.isFlipped;
            const card = document.getElementById('flashcard');
            if (card) card.classList.toggle('flipped', state.isFlipped);
            // Update button states
            document.querySelectorAll('.study-action-btn').forEach(btn => {
                btn.disabled = !state.isFlipped;
                btn.style.opacity = state.isFlipped ? '1' : '0.4';
                btn.style.cursor = state.isFlipped ? 'pointer' : 'default';
            });
            const hint = document.querySelector('.btn-flip-text');
            if (hint) hint.textContent = state.isFlipped ? 'Did you know it?' : 'Tap the card to flip';
        }

        function markCard(correct) {
            if (!state.isFlipped || state.studyIndex >= state.studyCards.length) return;
            const idx = state.studyCards[state.studyIndex];
            if (!state.progress[idx]) state.progress[idx] = { correct: 0, incorrect: 0, lastSeen: Date.now() };
            if (correct) {
                state.progress[idx].correct++;
                state.studySessionCorrect++;
                state.streak++;
            } else {
                state.progress[idx].incorrect++;
                state.streak = 0;
            }
            state.progress[idx].lastSeen = Date.now();
            state.studySessionTotal++;
            saveProgress();

            // Animate card out
            const card = document.getElementById('flashcard');
            if (card) {
                card.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
                card.style.opacity = '0';
                card.style.transform = state.isFlipped
                    ? 'rotateY(180deg) translateX(' + (correct ? '80px' : '-80px') + ')'
                    : 'translateX(' + (correct ? '80px' : '-80px') + ')';
            }

            setTimeout(() => {
                state.studyIndex++;
                state.isFlipped = false;
                render();
            }, 300);
        }

        /* ============================================================
           QUIZ VIEW
           ============================================================ */
        function startQuiz() {
            const indices = getFilteredIndices();
            if (indices.length < 4) { showToast('Need at least 4 cards for a quiz', 'warning'); return; }
            const selected = shuffleArray(indices).slice(0, Math.min(15, indices.length));
            const isBrandToGeneric = state.mode === 'brand-to-generic';
            const allAnswers = DRUG_DATA.map(d => isBrandToGeneric ? d.generic : d.brand);

            state.quizQuestions = selected.map(idx => {
                const drug = DRUG_DATA[idx];
                const question = isBrandToGeneric ? drug.brand : drug.generic;
                const correctAnswer = isBrandToGeneric ? drug.generic : drug.brand;
                // Generate 3 wrong answers
                const wrongPool = allAnswers.filter(a => a !== correctAnswer);
                const wrongs = shuffleArray(wrongPool).slice(0, 3);
                const options = shuffleArray([correctAnswer, ...wrongs]);
                return { idx, question, correctAnswer, options, correctIdx: options.indexOf(correctAnswer) };
            });
            state.quizIndex = 0;
            state.quizCorrect = 0;
            state.quizAnswered = false;
            navigate('quiz');
        }

        function renderQuiz() {
            if (state.quizQuestions.length === 0) {
                return `<div class="quiz-view animate-in"><div class="empty-state"><p>Start a quiz from the home screen</p><button class="action-btn btn-primary" data-action="nav" data-view="home" style="margin-top:16px">Go Home</button></div></div>`;
            }
            if (state.quizIndex >= state.quizQuestions.length) return renderQuizResults();

            const q = state.quizQuestions[state.quizIndex];
            const progress = ((state.quizIndex) / state.quizQuestions.length) * 100;
            const keys = ['A', 'B', 'C', 'D'];

            return `<div class="quiz-view animate-in">
    <div class="quiz-header">
      <div class="quiz-progress-text">Question ${state.quizIndex + 1} of ${state.quizQuestions.length}</div>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${progress}%"></div></div>
      <div class="quiz-score-bar">
        <span class="quiz-score-correct">${state.quizCorrect} correct</span>
        <span class="quiz-score-wrong">${state.quizIndex - state.quizCorrect} wrong</span>
      </div>
    </div>
    <div class="quiz-question-card">
      <div class="quiz-question-label">${state.mode === 'brand-to-generic' ? 'What is the generic name for' : 'What is the brand name for'}</div>
      <div class="quiz-question-text">${q.question}</div>
    </div>
    <div class="quiz-options">
      ${q.options.map((opt, i) => `
        <button class="quiz-option ${state.quizAnswered ? 'disabled' : ''} ${state.quizAnswered && i === q.correctIdx ? 'correct' : ''} ${state.quizAnswered && state._quizSelected === i && i !== q.correctIdx ? 'incorrect' : ''}"
          data-action="quiz-answer" data-idx="${i}" ${state.quizAnswered ? 'disabled' : ''}>
          <span class="option-key">${keys[i]}</span>
          <span>${opt}</span>
        </button>
      `).join('')}
    </div>
  </div>`;
        }

        function answerQuiz(optIdx) {
            if (state.quizAnswered) return;
            state.quizAnswered = true;
            state._quizSelected = optIdx;
            const q = state.quizQuestions[state.quizIndex];
            if (optIdx === q.correctIdx) {
                state.quizCorrect++;
                if (!state.progress[q.idx]) state.progress[q.idx] = { correct: 0, incorrect: 0, lastSeen: Date.now() };
                state.progress[q.idx].correct++;
                state.progress[q.idx].lastSeen = Date.now();
            } else {
                if (!state.progress[q.idx]) state.progress[q.idx] = { correct: 0, incorrect: 0, lastSeen: Date.now() };
                state.progress[q.idx].incorrect++;
                state.progress[q.idx].lastSeen = Date.now();
            }
            saveProgress();
            render();

            setTimeout(() => {
                state.quizIndex++;
                state.quizAnswered = false;
                state._quizSelected = -1;
                render();
            }, 1200);
        }

        function renderQuizResults() {
            const pct = Math.round((state.quizCorrect / state.quizQuestions.length) * 100);
            const keys = ['A', 'B', 'C', 'D'];
            return `<div class="quiz-view animate-in">
    <div class="quiz-results">
      <div class="result-score" style="color:${pct >= 70 ? 'var(--success)' : pct >= 40 ? 'var(--warning)' : 'var(--error)'}">${pct}%</div>
      <div class="result-label">${state.quizCorrect} out of ${state.quizQuestions.length} correct</div>
      <div class="quiz-results-breakdown">
        ${state.quizQuestions.map(q => {
                // Find if user selected correct - we can't know exactly, but we stored progress
                const isCorrect = true; // We'll just show Q→A
                return `<div class="breakdown-item">
            <span class="bi-status correct"></span>
            <span class="bi-q">${q.question}</span>
            <span class="bi-arrow">→</span>
            <span class="bi-a">${q.correctAnswer}</span>
          </div>`;
            }).join('')}
      </div>
      <div class="complete-actions">
        <button class="action-btn btn-secondary" data-action="nav" data-view="home">Home</button>
        <button class="action-btn btn-primary" data-action="start-quiz">New Quiz</button>
      </div>
    </div>
  </div>`;
        }

        /* ============================================================
           BROWSE VIEW
           ============================================================ */
        function renderBrowse() {
            const indices = getFilteredIndices();
            return `<div class="browse-view animate-in">
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Search drugs..." value="${state.search}" data-action="search-input" autocomplete="off" spellcheck="false">
    </div>
    <div class="browse-count">${indices.length} drug${indices.length !== 1 ? 's' : ''}</div>
    <div class="browse-grid">
      ${indices.length === 0 ? '<div class="empty-state"><p>No drugs match your search</p></div>' :
                    indices.map(i => {
                        const d = DRUG_DATA[i];
                        const m = getMastery(i);
                        const revealed = state.revealedItems.has(i);
                        return `<div class="browse-item ${revealed ? 'revealed' : ''}" data-action="browse-toggle" data-idx="${i}">
            <span class="mastery-dot ${m}"></span>
            <div class="bi-info">
              <div class="bi-brand">${d.brand}</div>
              <div class="bi-generic">${revealed ? d.generic : '•••••••••'}</div>
            </div>
            <span class="bi-cat">${d.cat}</span>
          </div>`;
                    }).join('')}
    </div>
  </div>`;
        }

        /* ============================================================
           STATS VIEW
           ============================================================ */
        function renderStats() {
            const s = getOverallStats();
            const catStats = getCategoryStats();
            return `<div class="stats-view animate-in">
    <h2>Statistics</h2>
    <div class="stats-grid">
      <div class="stats-card highlight">
        <div class="sc-value">${s.accuracy}%</div>
        <div class="sc-label">Accuracy</div>
      </div>
      <div class="stats-card">
        <div class="sc-value">${s.totalStudied}</div>
        <div class="sc-label">Cards Studied</div>
      </div>
      <div class="stats-card">
        <div class="sc-value" style="color:var(--success)">${s.totalCorrect}</div>
        <div class="sc-label">Total Correct</div>
      </div>
      <div class="stats-card">
        <div class="sc-value" style="color:var(--error)">${s.totalIncorrect}</div>
        <div class="sc-label">Total Incorrect</div>
      </div>
    </div>

    <div class="section-title">Mastery by Category</div>
    <div class="category-stats">
      ${CATEGORIES.map(cat => {
                const cs = catStats[cat];
                return `<div class="cat-stat-row">
          <span class="cat-stat-name">${cat}</span>
          <div class="cat-stat-bar"><div class="cat-stat-fill" style="width:${cs.pct}%"></div></div>
          <span class="cat-stat-pct">${cs.pct}%</span>
        </div>`;
            }).join('')}
    </div>

    <div class="section-title">Mastery Breakdown</div>
    <div class="quick-stats" style="margin-bottom:24px">
      <div class="stat-card mastered"><div class="stat-value">${s.mastered}</div><div class="stat-label">Mastered (70%+)</div></div>
      <div class="stat-card learning"><div class="stat-value">${s.learning}</div><div class="stat-label">Learning</div></div>
      <div class="stat-card new-cards"><div class="stat-value">${s.newCards}</div><div class="stat-label">Not Started</div></div>
    </div>

    <div class="reset-section">
      <button class="reset-btn" data-action="reset-progress">Reset All Progress</button>
    </div>
  </div>`;
        }

        /* ============================================================
           EVENT DELEGATION
           ============================================================ */
        function attachViewListeners() {
            // Focus search input if in browse view
            if (state.view === 'browse') {
                const input = document.getElementById('search-input');
                if (input && state.search) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
            }
            // Touch/swipe handling for study cards
            if (state.view === 'study' && state.studyIndex < state.studyCards.length) {
                const card = document.getElementById('flashcard');
                if (card) {
                    let startX = 0, startY = 0;
                    card.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, { passive: true });
                    card.addEventListener('touchend', e => {
                        const dx = e.changedTouches[0].clientX - startX;
                        const dy = e.changedTouches[0].clientY - startY;
                        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
                            if (dx > 0) markCard(true); else markCard(false);
                        }
                    }, { passive: true });
                }
            }
        }

        // Central event delegation on main content
        document.getElementById('main-content').addEventListener('click', (e) => {
            const target = e.target.closest('[data-action]');
            if (!target) return;
            const action = target.dataset.action;

            switch (action) {
                case 'set-mode':
                    state.mode = target.dataset.mode;
                    saveSettings();
                    render();
                    break;
                case 'set-cat':
                    state.category = target.dataset.cat;
                    render();
                    break;
                case 'start-study':
                    startStudy();
                    break;
                case 'start-quiz':
                    startQuiz();
                    break;
                case 'flip':
                    flipCard();
                    break;
                case 'mark-correct':
                    markCard(true);
                    break;
                case 'mark-incorrect':
                    markCard(false);
                    break;
                case 'quiz-answer':
                    answerQuiz(parseInt(target.dataset.idx));
                    break;
                case 'browse-toggle':
                    const idx = parseInt(target.dataset.idx);
                    if (state.revealedItems.has(idx)) state.revealedItems.delete(idx);
                    else state.revealedItems.add(idx);
                    render();
                    break;
                case 'nav':
                    navigate(target.dataset.view);
                    break;
                case 'reset-progress':
                    showModal('Reset Progress', 'This will erase all your study progress. This cannot be undone.', () => {
                        state.progress = {};
                        saveProgress();
                        render();
                        showToast('Progress has been reset', 'info');
                    }, 'Reset');
                    break;
            }
        });

        // Search input handling (use input event for real-time filtering)
        document.getElementById('main-content').addEventListener('input', (e) => {
            if (e.target.matches('[data-action="search-input"]')) {
                state.search = e.target.value;
                // Re-render browse grid without full re-render to keep focus
                const grid = document.querySelector('.browse-grid');
                const count = document.querySelector('.browse-count');
                if (grid) {
                    const indices = getFilteredIndices();
                    count.textContent = `${indices.length} drug${indices.length !== 1 ? 's' : ''}`;
                    grid.innerHTML = indices.length === 0 ? '<div class="empty-state"><p>No drugs match your search</p></div>' :
                        indices.map(i => {
                            const d = DRUG_DATA[i];
                            const m = getMastery(i);
                            const revealed = state.revealedItems.has(i);
                            return `<div class="browse-item ${revealed ? 'revealed' : ''}" data-action="browse-toggle" data-idx="${i}">
            <span class="mastery-dot ${m}"></span>
            <div class="bi-info">
              <div class="bi-brand">${d.brand}</div>
              <div class="bi-generic">${revealed ? d.generic : '•••••••••'}</div>
            </div>
            <span class="bi-cat">${d.cat}</span>
          </div>`;
                        }).join('');
                }
            }
        });

        // Modal events
        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target.id === 'modal-overlay') hideModal();
            const action = e.target.closest('[data-action]')?.dataset.action;
            if (action === 'modal-cancel') hideModal();
            if (action === 'modal-confirm') {
                const box = document.getElementById('modal-box');
                if (box._onConfirm) box._onConfirm();
                hideModal();
            }
        });

        // Bottom nav
        document.getElementById('bottom-nav').addEventListener('click', (e) => {
            const btn = e.target.closest('.nav-btn');
            if (btn) navigate(btn.dataset.view);
        });

        // Theme toggle
        document.getElementById('theme-toggle').addEventListener('click', () => {
            state.darkMode = !state.darkMode;
            document.documentElement.classList.toggle('dark', state.darkMode);
            document.getElementById('theme-icon-sun').style.display = state.darkMode ? 'block' : 'none';
            document.getElementById('theme-icon-moon').style.display = state.darkMode ? 'none' : 'block';
            saveSettings();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            switch (e.key) {
                case ' ':
                    e.preventDefault();
                    if (state.view === 'study') flipCard();
                    break;
                case 'ArrowRight': case 'd': case 'D':
                    if (state.view === 'study' && state.isFlipped) markCard(true);
                    break;
                case 'ArrowLeft': case 'a': case 'A':
                    if (state.view === 'study' && state.isFlipped) markCard(false);
                    break;
                case '1': case '2': case '3': case '4':
                    if (state.view === 'quiz' && !state.quizAnswered) answerQuiz(parseInt(e.key) - 1);
                    break;
                case 'Escape':
                    if (document.getElementById('modal-overlay').classList.contains('active')) hideModal();
                    else if (state.view !== 'home') navigate('home');
                    break;
            }
        });

        /* ============================================================
           PWA: SERVICE WORKER & MANIFEST
           ============================================================ */
        function registerServiceWorker() {
            if (!('serviceWorker' in navigator)) return;
            const swCode = `
    const CACHE_NAME = 'drugflash-v2';
    self.addEventListener('install', () => self.skipWaiting());
    self.addEventListener('activate', (e) => { e.waitUntil(clients.claim()); });
    self.addEventListener('fetch', (e) => {
      if (e.request.method !== 'GET') return;
      e.respondWith(
        caches.match(e.request).then(cached => {
          const fetchPromise = fetch(e.request).then(response => {
            if (response && response.status === 200 && response.type === 'basic') {
              const clone = response.clone();
              caches.open(CACHE_NAME).then(cache => cache.put(e.request, clone));
            }
            return response;
          }).catch(() => cached);
          return cached || fetchPromise;
        })
      );
    });
  `;
            try {
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl, { scope: '/' }).then(reg => {
                    // Pre-cache current page
                    caches.open('drugflash-v2').then(cache => {
                        cache.add(window.location.href).catch(() => { });
                        // Cache Google Fonts
                        cache.add('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap').catch(() => { });
                    });
                }).catch(() => { });
            } catch (e) { }
        }

        function registerManifest() {
            const iconSvg = (size) => {
                const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><rect width="${size}" height="${size}" rx="${Math.round(size * 0.2)}" fill="#0D9488"/><rect x="${Math.round(size * 0.25)}" y="${Math.round(size * 0.35)}" width="${Math.round(size * 0.5)}" height="${Math.round(size * 0.3)}" rx="${Math.round(size * 0.15)}" fill="white" transform="rotate(-30 ${size / 2} ${size / 2})"/><rect x="${Math.round(size * 0.25)}" y="${Math.round(size * 0.35)}" width="${Math.round(size * 0.5)}" height="${Math.round(size * 0.3)}" rx="${Math.round(size * 0.15)}" fill="white" transform="rotate(30 ${size / 2} ${size / 2})" opacity="0.6"/></svg>`;
                return `data:image/svg+xml,${encodeURIComponent(svg)}`;
            };
            const manifest = {
                name: 'DrugFlash - Drug Name Flashcards',
                short_name: 'DrugFlash',
                description: 'Study drug brand and generic names with flashcards',
                start_url: window.location.href.split('?')[0],
                display: 'standalone',
                background_color: '#0F172A',
                theme_color: '#0D9488',
                orientation: 'portrait-primary',
                categories: ['medical', 'education'],
                icons: [
                    { src: iconSvg(192), sizes: '192x192', type: 'image/svg+xml', purpose: 'any maskable' },
                    { src: iconSvg(512), sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }
                ]
            };
            try {
                const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
                document.getElementById('manifest-link').href = URL.createObjectURL(blob);
            } catch (e) { }
        }

        // Install prompt
        let deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-btn').classList.add('visible');
        });
        document.getElementById('install-btn').addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(choice => {
                    if (choice.outcome === 'accepted') showToast('App installed successfully', 'success');
                    deferredPrompt = null;
                    document.getElementById('install-btn').classList.remove('visible');
                });
            }
        });
        window.addEventListener('appinstalled', () => {
            deferredPrompt = null;
            document.getElementById('install-btn').classList.remove('visible');
            showToast('App installed successfully', 'success');
        });

        /* ============================================================
           INITIALIZATION
           ============================================================ */
        function init() {
            loadSettings();
            loadProgress();
            registerManifest();
            registerServiceWorker();

            // Apply dark mode
            document.documentElement.classList.toggle('dark', state.darkMode);
            document.getElementById('theme-icon-sun').style.display = state.darkMode ? 'block' : 'none';
            document.getElementById('theme-icon-moon').style.display = state.darkMode ? 'none' : 'block';

            // Initial render
            render();
        }

        init();
    </script>
</body>

</html>
